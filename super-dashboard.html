<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Super Admin | Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="d-flex" id="wrapper">

        <!-- Sidebar -->
        <div class="bg-white border-end" id="sidebar-wrapper" style="width: 250px; min-height: 100vh;">
            <div class="sidebar-heading p-4 border-bottom bg-light">
                <h5 class="fw-bold text-primary m-0">
                    <i class="fa-solid fa-user-shield me-2"></i> Super Admin
                </h5>
            </div>
            <div class="list-group list-group-flush pt-2">
                <a href="#"
                    class="list-group-item list-group-item-action bg-transparent border-0 active fw-bold text-primary">
                    <i class="fa-solid fa-building-columns me-2"></i> Institutions
                </a>
                <!-- Expansion: Add more menu items here -->
            </div>
            <div class="mt-auto p-4 border-top">
                <button id="logoutBtn" class="btn btn-outline-danger w-100 btn-sm">
                    <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
                </button>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="flex-grow-1 bg-light">

            <!-- Top Nav (Mobile Toggle) -->
            <nav class="navbar navbar-light bg-white border-bottom shadow-sm px-4 py-3 mb-4">
                <button class="btn btn-light btn-sm d-md-none" id="menu-toggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <span class="navbar-text ms-auto small text-muted">
                    Welcome, <strong>Administrator</strong>
                </span>
            </nav>

            <div class="container-fluid px-4">

                <div class="row g-4 mb-4">
                    <!-- Stats Cards -->
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center">
                                <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
                                    <i class="fa-solid fa-building text-primary fa-xl"></i>
                                </div>
                                <div>
                                    <h6 class="text-muted text-uppercase small fw-bold mb-1">Total Institutions</h6>
                                    <h3 class="fw-bold mb-0" id="totalInstitutions">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <!-- Create Institution Form -->
                    <div class="col-lg-4 mb-4">
                        <div class="card shadow border-0">
                            <div class="card-header bg-white">
                                <h6 class="fw-bold m-0 text-primary">
                                    <i class="fa-solid fa-plus-circle me-2"></i> New Institution
                                </h6>
                            </div>
                            <div class="card-body">
                                <form id="addInstitutionForm">
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted">Institution Name</label>
                                        <input type="text" id="institutionName" class="form-control"
                                            placeholder="e.g. Springfield High" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted">Admin Email</label>
                                        <input type="email" id="adminEmail" class="form-control"
                                            placeholder="admin@school.com" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted">Admin Password</label>
                                        <input type="password" id="adminPassword" class="form-control"
                                            placeholder="Min. 6 chars" required>
                                    </div>

                                    <!-- Validity Date Range (optional) -->
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted">
                                            <i class="fa-solid fa-calendar-check me-1 text-success"></i>
                                            Valid From <span class="text-muted fw-normal">(optional)</span>
                                        </label>
                                        <input type="date" id="validFrom" class="form-control">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted">
                                            <i class="fa-solid fa-calendar-xmark me-1 text-danger"></i>
                                            Valid Until <span class="text-muted fw-normal">(optional)</span>
                                        </label>
                                        <input type="date" id="validUntil" class="form-control">
                                        <div class="form-text text-muted">
                                            Leave blank to keep using the manual Active/Inactive toggle.
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-primary w-100 fw-bold">
                                        <i class="fa-solid fa-check me-2"></i> Create Institution
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Institutions List -->
                    <div class="col-lg-8">
                        <div class="card shadow border-0">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h6 class="fw-bold m-0 text-primary">
                                    <i class="fa-solid fa-list me-2"></i> Recent Institutions
                                </h6>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0" id="institutionTable">
                                        <thead class="bg-light">
                                            <tr>
                                                <th class="ps-4">Name</th>
                                                <th>Admin Email</th>
                                                <th>Created At</th>
                                                <th>Validity</th>
                                                <th>Status</th>
                                                <th class="text-end pe-4">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="institutionList">
                                            <!-- Populated via JS -->
                                        </tbody>
                                    </table>
                                </div>
                                <!-- Empty State -->
                                <div id="emptyState" class="text-center py-5 d-none">
                                    <i class="fa-regular fa-folder-open fa-2x text-muted mb-2"></i>
                                    <p class="text-muted small">No institutions found.</p>
                                </div>
                                <!-- Loading State -->
                                <div id="loadingState" class="text-center py-5">
                                    <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script type="module" src="assets/js/role-guard.js"></script>
    <script type="module">
        import { requireAuth } from "./assets/js/role-guard.js";
        requireAuth('super');

        // Toggle Menu
        document.getElementById("menu-toggle").addEventListener("click", function (e) {
            e.preventDefault();
            document.getElementById("wrapper").classList.toggle("toggled");
        });
    </script>
    <script type="module" src="assets/js/super-admin.js"></script>

    <style>
        /* Simple Sidebar Toggle CSS */
        #wrapper.toggled #sidebar-wrapper {
            margin-left: -250px;
        }

        @media (max-width: 768px) {
            #sidebar-wrapper {
                margin-left: -250px;
                position: fixed;
                z-index: 1000;
                height: 100%;
                transition: margin .25s ease-out;
            }

            #wrapper.toggled #sidebar-wrapper {
                margin-left: 0;
            }
        }
    </style>

</body>

</html>
